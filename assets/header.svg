<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" width="860" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&amp;family=Syne:wght@800&amp;display=swap');

      .bg { fill: #0a0a0f; }
      .grid-line { stroke: #2a2a3a; stroke-width: 0.5; opacity: 0.4; }

      .name {
        font-family: 'Syne', 'Arial Black', sans-serif;
        font-size: 52px;
        font-weight: 800;
        fill: #f0f0f8;
        letter-spacing: -2px;
      }
      .name-accent { fill: #4f8ef7; }

      .sub {
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        fill: #8888aa;
        letter-spacing: 1px;
      }

      .tag {
        font-family: 'Space Mono', monospace;
        font-size: 10px;
        fill: #55556a;
        letter-spacing: 3px;
        text-transform: uppercase;
      }

      .line-accent {
        stroke: #4f8ef7;
        stroke-width: 2;
        fill: none;
      }

      .dot-accent { fill: #4f8ef7; }
      .dot-purple { fill: #7c3aed; }

      /* Glow filter */
      .glow-blue { filter: url(#glowBlue); }
      .glow-purple { filter: url(#glowPurple); }

      /* Animations */
      .fade-in-1 { animation: fadeUp 0.8s 0.2s ease both; }
      .fade-in-2 { animation: fadeUp 0.8s 0.5s ease both; }
      .fade-in-3 { animation: fadeUp 0.8s 0.8s ease both; }
      .fade-in-4 { animation: fadeUp 0.8s 1.0s ease both; }

      .scan-line { animation: scan 4s linear infinite; }
      .blink-cursor { animation: blink 1s step-end infinite; }
      .pulse-dot1 { animation: pulse 2s 0s ease-in-out infinite; }
      .pulse-dot2 { animation: pulse 2s 0.4s ease-in-out infinite; }
      .pulse-dot3 { animation: pulse 2s 0.8s ease-in-out infinite; }
      .shimmer { animation: shimmer 3s 1.5s linear infinite; }
      .float1 { animation: float 6s 0s ease-in-out infinite; }
      .float2 { animation: float 6s 1s ease-in-out infinite; }
      .draw-line { animation: drawLine 1.5s 0.3s ease forwards; stroke-dasharray: 300; stroke-dashoffset: 300; }
      .draw-line2 { animation: drawLine 1.5s 0.6s ease forwards; stroke-dasharray: 200; stroke-dashoffset: 200; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes scan {
        0%   { transform: translateY(-10px); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.6; }
        100% { transform: translateY(210px); opacity: 0; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.3; r: 3; }
        50%       { opacity: 1; r: 5; }
      }
      @keyframes shimmer {
        0%   { stop-color: #4f8ef7; }
        50%  { stop-color: #7c3aed; }
        100% { stop-color: #4f8ef7; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-6px); }
      }
      @keyframes drawLine {
        to { stroke-dashoffset: 0; }
      }
    </style>

    <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0f0f8"/>
      <stop offset="60%" style="stop-color:#f0f0f8"/>
      <stop offset="100%" style="stop-color:#4f8ef7" class="shimmer"/>
    </linearGradient>

    <clipPath id="clip">
      <rect width="860" height="200"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">

    <!-- Background -->
    <rect width="860" height="200" class="bg"/>

    <!-- Grid lines -->
    <g>
      <line x1="0" y1="48" x2="860" y2="48" class="grid-line"/>
      <line x1="0" y1="96" x2="860" y2="96" class="grid-line"/>
      <line x1="0" y1="144" x2="860" y2="144" class="grid-line"/>
      <line x1="48" y1="0" x2="48" y2="200" class="grid-line"/>
      <line x1="96" y1="0" x2="96" y2="200" class="grid-line"/>
      <line x1="144" y1="0" x2="144" y2="200" class="grid-line"/>
      <line x1="192" y1="0" x2="192" y2="200" class="grid-line"/>
      <line x1="240" y1="0" x2="240" y2="200" class="grid-line"/>
      <line x1="288" y1="0" x2="288" y2="200" class="grid-line"/>
      <line x1="336" y1="0" x2="336" y2="200" class="grid-line"/>
      <line x1="384" y1="0" x2="384" y2="200" class="grid-line"/>
      <line x1="432" y1="0" x2="432" y2="200" class="grid-line"/>
      <line x1="480" y1="0" x2="480" y2="200" class="grid-line"/>
      <line x1="528" y1="0" x2="528" y2="200" class="grid-line"/>
      <line x1="576" y1="0" x2="576" y2="200" class="grid-line"/>
      <line x1="624" y1="0" x2="624" y2="200" class="grid-line"/>
      <line x1="672" y1="0" x2="672" y2="200" class="grid-line"/>
      <line x1="720" y1="0" x2="720" y2="200" class="grid-line"/>
      <line x1="768" y1="0" x2="768" y2="200" class="grid-line"/>
      <line x1="816" y1="0" x2="816" y2="200" class="grid-line"/>
    </g>

    <!-- Glow blobs -->
    <circle cx="780" cy="30" r="120" fill="#7c3aed" opacity="0.08" filter="url(#glowSoft)" class="float1"/>
    <circle cx="100" cy="170" r="100" fill="#4f8ef7" opacity="0.07" filter="url(#glowSoft)" class="float2"/>

    <!-- Scan line -->
    <rect x="0" y="0" width="860" height="1.5" fill="#4f8ef7" opacity="0.3" class="scan-line"/>

    <!-- Decorative left accent line -->
    <line x1="40" y1="40" x2="40" y2="160" stroke="#4f8ef7" stroke-width="1.5" opacity="0.6" class="draw-line"/>
    <circle cx="40" cy="40" r="3" class="dot-accent pulse-dot1"/>
    <circle cx="40" cy="100" r="3" class="dot-accent pulse-dot2"/>
    <circle cx="40" cy="160" r="3" class="dot-accent pulse-dot3"/>

    <!-- Top label -->
    <g class="fade-in-1">
      <text x="64" y="48" class="tag">// bharath-mp-2005 · founder-engineer</text>
    </g>

    <!-- Main name -->
    <g class="fade-in-2">
      <text x="64" y="115" class="name" fill="url(#nameGrad)">Bharath <tspan class="name-accent">Palanisamy</tspan></text>
    </g>

    <!-- Bottom tagline -->
    <g class="fade-in-3">
      <text x="64" y="145" class="sub">Founder &amp; CEO @ ViBha Tech  ·  M.Tech Data Science @ VIT Vellore</text>
    </g>

    <!-- Status pills row -->
    <g class="fade-in-4">
      <!-- Tamil Nadu pill -->
      <rect x="64" y="158" width="130" height="22" rx="11" fill="#1c1c28" stroke="#2a2a3a" stroke-width="1"/>
      <text x="78" y="173" class="sub" font-size="10" fill="#8888aa">📍 Tamil Nadu, India</text>

      <!-- Open to collaborate -->
      <rect x="204" y="158" width="148" height="22" rx="11" fill="#1c1c28" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
      <circle cx="216" cy="169" r="4" fill="#22c55e" opacity="0.8" class="pulse-dot1"/>
      <text x="226" y="173" class="sub" font-size="10" fill="#22c55e">Open to Collaborate</text>

      <!-- Play store -->
      <rect x="362" y="158" width="150" height="22" rx="11" fill="#1c1c28" stroke="#2a2a3a" stroke-width="1"/>
      <text x="376" y="173" class="sub" font-size="10" fill="#8888aa">📱 2 Apps on Play Store</text>
    </g>

    <!-- Decorative right corner dots -->
    <g class="float1">
      <circle cx="820" cy="50" r="2" fill="#4f8ef7" opacity="0.6"/>
      <circle cx="835" cy="65" r="1.5" fill="#7c3aed" opacity="0.5"/>
      <circle cx="845" cy="45" r="1" fill="#4f8ef7" opacity="0.4"/>
      <circle cx="810" cy="80" r="2.5" fill="#7c3aed" opacity="0.3"/>
    </g>

    <!-- Bottom accent line -->
    <line x1="64" y1="195" x2="500" y2="195" stroke="#4f8ef7" stroke-width="1" opacity="0.3" class="draw-line2"/>
    <circle cx="500" cy="195" r="2.5" fill="#4f8ef7" opacity="0.6" class="pulse-dot3"/>

  </g>
</svg>
