<svg viewBox="0 0 860 200" xmlns="http://www.w3.org/2000/svg" width="860" height="200" role="img" aria-label="Bharath Palanisamy header">
  <defs>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f8"/>
      <stop offset="100%" stop-color="#4f8ef7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="860" height="200" fill="#0a0a0f" />

  <!-- Simple grid (static) -->
  <g stroke="#2a2a3a" stroke-width="0.6" opacity="0.32">
    <line x1="0" y1="48" x2="860" y2="48" />
    <line x1="0" y1="96" x2="860" y2="96" />
    <line x1="0" y1="144" x2="860" y2="144" />
    <line x1="48" y1="0" x2="48" y2="200" />
    <line x1="96" y1="0" x2="96" y2="200" />
    <line x1="144" y1="0" x2="144" y2="200" />
  </g>

  <!-- Decorative glow shapes (subtle) -->
  <circle cx="780" cy="30" r="120" fill="#7c3aed" opacity="0.06" />
  <circle cx="100" cy="170" r="100" fill="#4f8ef7" opacity="0.05" />

  <!-- Left accent line and dots -->
  <line x1="40" y1="40" x2="40" y2="160" stroke="#4f8ef7" stroke-width="1" opacity="0.6" />
  <circle cx="40" cy="40" r="3" fill="#4f8ef7" />
  <circle cx="40" cy="100" r="3" fill="#4f8ef7" />
  <circle cx="40" cy="160" r="3" fill="#4f8ef7" />

  <!-- Top label -->
  <text x="64" y="46" fill="#5a5a6f" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="11">// bharath-mp-2005 · founder-engineer</text>

  <!-- Main name (use common fallback fonts so it renders the same everywhere) -->
  <text x="64" y="116" font-family="Impact, 'Arial Black', sans-serif" font-size="56" font-weight="700" fill="url(#nameGrad)">
    Bharath <tspan fill="#4f8ef7">Palanisamy</tspan>
  </text>

  <!-- Bottom tagline -->
  <text x="64" y="148" fill="#9b9bb0" font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif" font-size="12">Founder &amp; CEO · ViBha Tech · M.Tech Data Science @ VIT Vellore</text>

  <!-- Status pills row -->
  <g>
    <rect x="64" y="158" width="140" height="24" rx="12" fill="#111118" stroke="#2a2a3a" />
    <text x="80" y="174" fill="#bdbdd0" font-family="Arial, monospace" font-size="11">📍 Tamil Nadu, India</text>

    <rect x="216" y="158" width="156" height="24" rx="12" fill="#0f1720" stroke="#1f8f53" />
    <text x="232" y="174" fill="#22c55e" font-family="Arial, monospace" font-size="11">Open to Collaborate</text>

    <rect x="384" y="158" width="156" height="24" rx="12" fill="#111118" stroke="#2a2a3a" />
    <text x="400" y="174" fill="#bdbdd0" font-family="Arial, monospace" font-size="11">📱 2 Apps on Play Store</text>
  </g>

  <!-- Right decorative dots -->
  <g opacity="0.5" fill="#4f8ef7">
    <circle cx="820" cy="50" r="2" />
    <circle cx="835" cy="65" r="1.6" fill="#7c3aed" />
    <circle cx="845" cy="45" r="1.2" />
  </g>

</svg>
